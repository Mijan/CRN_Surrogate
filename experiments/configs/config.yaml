defaults:
  - model: default
  - training: default
  - dataset: mass_action_3s
  - solver: stochastic
  - measurement: default
  - _self_
  - optional experiment: null

# Global
experiment_name: unnamed
wandb_project: crn-surrogate
wandb_group: ""
seed: 42
device: auto
no_wandb: false

# Data generation
generation:
  output_dir: experiments/datasets
  checkpoint_every: 500
  sim_timeout: 30
  n_init_conditions: 1
  use_fast_ssa: true
  use_ode_prescreen: true
  resume_train: null
  resume_val: null

# Training run
run:
  dataset_dir: experiments/datasets
  wandb_artifact: null
  resume: null
  resume_weights_only: null

hydra:
  run:
    dir: .
  output_subdir: null
