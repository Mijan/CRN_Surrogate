lr: 1.0e-3
max_epochs: 1000
batch_size: 512
n_trajectory_samples: 16
dt: 0.1
grad_clip_norm: 1.0
scheduler_type: reduce_on_plateau
training_mode: teacher_forcing
scheduled_sampling_start_epoch: 50
