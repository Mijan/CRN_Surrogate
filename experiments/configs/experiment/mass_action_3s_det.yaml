# @package _global_
defaults:
  - override /model: large
  - override /training: long
  - override /dataset: mass_action_3s_det
  - override /solver: deterministic
  - override /measurement: default

experiment_name: mass_action_3s_det
wandb_group: mass-action-3s-det

training:
  lr: 3.0e-4
  max_epochs: 1000
  batch_size: 1024
  n_ssa_samples: 1
  checkpoint_every: 20

model:
  max_n_reactions: 7
  context_dropout: 0.1
  mlp_dropout: 0.1

measurement:
  noise_mode: fixed
  noise_init_eps: 5
  min_variance: 1.0e-2

generation:
  n_init_conditions: 8
