[tox]
min_version = 4.0
env_list =
    py311
    lint
    type
    docs
    format_check
    format

[testenv]
description = Run unit tests with coverage
package = editable
extras = test
deps =
commands_pre =
    python -c "import os; os.makedirs('test-results', exist_ok=True)"
commands =
    pytest --durations=10 --junitxml=test-results/pytest-results-{envname}.xml --cov=src/crn_surrogate --cov-report=html:test-results/coverage --cov-report=xml:test-results/coverage.xml tests -vv
    python -m coverage report -m

[testenv:lint]
description = Lint (ruff)
skip_install = true
deps = ruff
commands =
    ruff check src/crn_surrogate tests experiments

[testenv:format_check]
description = Check formatting (ruff)
skip_install = true
deps = ruff
commands =
    ruff format --check src/crn_surrogate tests experiments
    ruff check src/crn_surrogate tests experiments

[testenv:format]
description = Auto-format + auto-fix safe issues (ruff)
skip_install = true
deps = ruff
commands =
    ruff format src/crn_surrogate tests experiments
    ruff check --fix src/crn_surrogate tests experiments

[testenv:type]
description = Type-check (mypy)
skip_install = true
deps =
    mypy
    omegaconf>=2.3
    hydra-core>=1.3
commands =
    mypy src/crn_surrogate experiments

[testenv:docs]
description = Docstring coverage gate (interrogate)
skip_install = true
deps = interrogate
commands =
    interrogate src/crn_surrogate
